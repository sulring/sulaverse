# Sulaverse Dark — kitty terminal theme
# Place in ~/.config/kitty/ and add: include sulaverse-dark.conf

background            #161d2c
foreground            #dce5f4
selection_background  #3d4352
selection_foreground  #dce5f4
cursor                #dce5f4
cursor_text_color     #161d2c
url_color             #3d8cbd

# Window border
active_border_color   #9893be
inactive_border_color #3d4352
bell_border_color     #f5ac7a

# Tab bar
tab_bar_background    #1d232f
active_tab_background #9893be
active_tab_foreground #1f252d
inactive_tab_background #1d232f
inactive_tab_foreground #697386

# ANSI colors
# Black
color0  #1f252d
color8  #697386
# Red
color1  #ec5f5f
color9  #ec5f5f
# Green
color2  #85d2d6
color10 #85d2d6
# Yellow
color3  #f5ac7a
color11 #ecdac0
# Blue
color4  #3d8cbd
color12 #3d8cbd
# Magenta
color5  #9893be
color13 #9893be
# Cyan
color6  #85d2d6
color14 #85d2d6
# White
color7  #8d93ab
color15 #dce5f4
