# Sulaverse Light — kitty terminal theme
# Place in ~/.config/kitty/ and add: include sulaverse-light.conf

background            #f7f2e8
foreground            #24324c
selection_background  #ebdbcc
selection_foreground  #24324c
cursor                #24324c
cursor_text_color     #f7f2e8
url_color             #337fae

# Window border
active_border_color   #6b639c
inactive_border_color #ebdbcc
bell_border_color     #d5651a

# Tab bar
tab_bar_background    #fff9f0
active_tab_background #6b639c
active_tab_foreground #efe8e0
inactive_tab_background #fff9f0
inactive_tab_foreground #9596b1

# ANSI colors
# Black
color0  #efe8e0
color8  #9596b1
# Red
color1  #b54c40
color9  #b54c40
# Green
color2  #63abb0
color10 #63abb0
# Yellow
color3  #d5651a
color11 #c59c63
# Blue
color4  #337fae
color12 #337fae
# Magenta
color5  #6b639c
color13 #6b639c
# Cyan
color6  #63abb0
color14 #63abb0
# White
color7  #616780
color15 #24324c
